<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tablero Comercial 2026 — ABC + Multicap</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--navy:#16243f;--navy2:#26396b;--accent:#E8A020;--green:#1E8449;--green2:#27AE60;--red:#C0392B;--orange:#E67E22;--blue:#2E86AB;--bg:#EEF2F8;--card:#fff;--border:#DDE3EE;--text:#1A1A2E;--text2:#6A718A;--radius:14px;--shadow:0 2px 14px rgba(20,36,63,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy),var(--navy2))}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy),var(--navy2))}
.lcard{background:#fff;border-radius:22px;padding:44px 38px;width:380px;box-shadow:0 24px 70px rgba(0,0,0,.35);text-align:center}
.llogo{font-size:2.6rem;margin-bottom:6px}
.ltitle{font-size:1.45rem;font-weight:800;color:var(--navy)}
.lsub{font-size:.85rem;color:var(--text2);margin-bottom:28px}
.llabel{font-size:.78rem;font-weight:700;color:var(--text2);text-align:left;margin-bottom:6px;display:block}
.lsel{width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:11px;font-size:.98rem;outline:none;color:var(--text);background:#fff}
.lsel:focus{border-color:var(--navy2)}
.lbtn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:11px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:22px}
.lbtn:hover{background:var(--navy2)}
#app{display:none}
.topbar{background:var(--navy);color:#fff;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:200}
.tlogo{font-weight:800;font-size:1.05rem;display:flex;align-items:center;gap:9px}
.tright{display:flex;align-items:center;gap:12px}
.tuser{font-size:.85rem;background:rgba(255,255,255,.15);padding:6px 15px;border-radius:20px;font-weight:600}
.tbtn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:7px 15px;border-radius:8px;cursor:pointer;font-size:.84rem;font-weight:600}
.tbtn:hover{background:rgba(255,255,255,.25)}
.tabs{background:#fff;border-bottom:1px solid var(--border);display:flex;padding:0 18px;gap:4px;overflow-x:auto;white-space:nowrap;position:sticky;top:58px;z-index:150}
.tab{padding:15px 20px;font-size:.88rem;font-weight:700;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;flex-shrink:0}
.tab.active{color:var(--navy);border-bottom-color:var(--accent)}
.tab:hover{color:var(--navy)}
.content{padding:22px;max-width:1320px;margin:0 auto}
.pane{display:none}.pane.active{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hero{background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;border-radius:18px;padding:26px 30px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:26px;align-items:center;justify-content:space-between}
.hero-hi{font-size:1.7rem;font-weight:800}
.hero-sub{font-size:.9rem;opacity:.8;margin-top:3px}
.rings{display:flex;gap:30px;flex-wrap:wrap}
.ring-wrap{text-align:center}
.ring-lbl{font-size:.74rem;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ring{position:relative;width:120px;height:120px;margin:0 auto}
.ring svg{transform:rotate(-90deg)}
.ring-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:1.5rem;font-weight:800;line-height:1}
.ring-cap{font-size:.66rem;opacity:.8;margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border-left:5px solid var(--accent)}
.kpi-lbl{font-size:.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.kpi-val{font-size:1.65rem;font-weight:800;color:var(--navy);line-height:1.05}
.kpi-sub{font-size:.78rem;color:var(--text2);margin-top:5px}
.card{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.ctitle{font-size:.98rem;font-weight:800;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.cdesc{font-size:.82rem;color:var(--text2);margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:18px}
@media(max-width:920px){.g2,.g3{grid-template-columns:1fr}}
.ch{position:relative;height:280px}
.tbl{width:100%;border-collapse:collapse;font-size:.86rem}
.tbl th{background:var(--navy);color:#fff;padding:11px 13px;text-align:left;font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:11px 13px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#F7F9FD}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tscroll{overflow-x:auto}
.pbg{background:#EDF0F7;border-radius:7px;height:11px;overflow:hidden;min-width:90px}
.pfill{height:11px;border-radius:7px;transition:width .4s}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.74rem;font-weight:700}
.b-green{background:#D5F5E3;color:#1E7E45}.b-red{background:#FADBD8;color:#B03A2E}
.b-orange{background:#FDEBD0;color:#B9770E}.b-blue{background:#E5F0F7;color:#1A5276}
.b-gray{background:#ECEFF5;color:#5A6178}
.segrow{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border)}
.segrow:last-child{border-bottom:none}
.segname{flex:0 0 165px;font-weight:700;font-size:.86rem}
.segbar{flex:1}
.segnums{flex:0 0 160px;text-align:right;font-size:.8rem;color:var(--text2)}
.segpct{flex:0 0 56px;text-align:right;font-weight:800;font-size:.95rem}
.ri{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.rpos{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0}
.gold{background:#F9E79F;color:#7D6608}.silver{background:#E5E8EC;color:#566}.bronze{background:#F5D6BA;color:#784212}
.rnorm{background:var(--bg);color:var(--text2)}.rme{background:var(--navy);color:#fff}
.rname{flex:1;font-weight:700;font-size:.9rem}.rsub{font-size:.74rem;font-weight:400;color:var(--text2);margin-top:1px}
.ramt{font-weight:800;font-size:.92rem;text-align:right}
.act{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:11px;margin-bottom:9px;border-left:5px solid}
.act.red{background:#FDEDEC;border-color:var(--red)}
.act.orange{background:#FEF5EB;border-color:var(--orange)}
.act.blue{background:#EAF3F9;border-color:var(--blue)}
.act-ico{font-size:1.3rem}
.act-main{flex:1}
.act-name{font-weight:800;font-size:.9rem;color:var(--navy)}
.act-det{font-size:.78rem;color:var(--text2);margin-top:2px}
.act-amt{font-weight:800;font-size:.9rem;white-space:nowrap}
.inp{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:.86rem;font-variant-numeric:tabular-nums;text-align:right;width:130px}
.inp:focus{outline:none;border-color:var(--navy2)}
.srch{padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.86rem;width:240px}
.srch:focus{outline:none;border-color:var(--navy2)}
.btn{padding:10px 18px;border:none;border-radius:9px;font-size:.86rem;font-weight:700;cursor:pointer}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy2)}
.btn-ghost{background:#ECEFF5;color:var(--text2)}.btn-ghost:hover{background:#DDE3EE}
.empty{text-align:center;padding:34px;color:var(--text2)}.empty .ico{font-size:2rem;margin-bottom:8px}
.pill{display:inline-block;padding:4px 11px;border-radius:16px;font-size:.76rem;font-weight:600;background:var(--bg);margin:3px 4px 0 0;color:var(--text2)}
.note{background:#FFF8E8;border:1px solid #F2D98A;border-radius:10px;padding:12px 15px;font-size:.83rem;color:#7D5A00;margin-bottom:16px}
.fbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
</style>
</head>
<body>
<div id="gate">
  <div class="lcard">
    <div class="llogo">🔒</div>
    <div class="ltitle">Tablero Comercial</div>
    <div class="lsub">Acceso protegido · ingresá la contraseña</div>
    <label class="llabel">Contraseña del equipo</label>
    <input type="password" class="lsel" id="gpass" placeholder="••••••••" onkeydown="if(event.key==='Enter')gateSubmit()" style="text-align:center">
    <button class="lbtn" onclick="gateSubmit()">Desbloquear →</button>
    <div class="lerr" id="gerr" style="color:var(--red);font-size:.85rem;margin-top:10px;min-height:18px"></div>
  </div>
</div>
<div id="login" style="display:none">
  <div class="lcard">
    <div class="llogo">📊</div>
    <div class="ltitle">Tablero Comercial</div>
    <div class="lsub">ABC Accesorios + Multicapotas · 2026</div>
    <label class="llabel">¿Quién sos?</label>
    <select class="lsel" id="usr">
      <option value="">— Seleccioná tu nombre —</option>
      <option value="gerencia">— Gerencia —</option>
    </select>
    <button class="lbtn" onclick="doLogin()">Ingresar →</button>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="tlogo">📊 Tablero Comercial <span style="opacity:.6;font-weight:500;font-size:.85rem">2026</span></div>
    <div class="tright"><div class="tuser" id="tuser">—</div><button class="tbtn" onclick="doLogout()">Salir</button></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

function _b64d(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function gateSubmit(){
  var pw=document.getElementById('gpass').value, err=document.getElementById('gerr');
  if(!pw){return;}
  err.style.color='var(--text2)'; err.textContent='Descifrando...';
  try{
    var salt=_b64d(ENC.salt), iv=_b64d(ENC.iv), ct=_b64d(ENC.ct);
    var bk=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:ENC.iter,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
    var obj=JSON.parse(new TextDecoder().decode(pt));
    DD=obj.DD; DD2=obj.DD2; initData();
    document.getElementById('gate').style.display='none';
    document.getElementById('login').style.display='flex';
    err.textContent='';
  }catch(e){ err.style.color='var(--red)'; err.textContent='Contraseña incorrecta'; }
}


var MESES,ML,ULT,ULTI,PENI,PEN,EC,ECI;
var _PAL=['#2E86AB','#8E44AD','#16A085','#E67E22','#C0392B','#2C3E50','#1F618D','#7D6608'];
function initData(){ MESES=DD.meses; ML=DD.meses_label; ULT=DD.mes_ref; ULTI=MESES.indexOf(DD.mes_ref); PENI=ULTI-1; PEN=MESES[PENI]; EC=DD.en_curso; ECI=MESES.indexOf(EC.mes);
  DD.vendedores.forEach(function(v,i){VCOLORS[v]=_PAL[i%_PAL.length];});
  var sel=document.getElementById('usr');
  DD.vendedores.forEach(function(v){var o=document.createElement('option');o.textContent=v;sel.insertBefore(o,sel.lastElementChild);});
}
var VCOLORS={};
var charts=[], CURRENT='';

function $(id){return document.getElementById(id);}
function nf(n){return Math.round(n).toLocaleString('es-AR');}
function money(n){
  n=n||0; var a=Math.abs(n);
  if(a>=1e9) return '$'+(n/1e9).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})+' MM';
  if(a>=1e6) return '$'+(n/1e6).toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1})+' M';
  if(a>=1e3) return '$'+Math.round(n/1e3).toLocaleString('es-AR')+' mil';
  return '$'+nf(n);
}
function moneyFull(n){return '$'+nf(n);}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function cumpColor(p){return p>=100?'var(--green2)':p>=80?'var(--orange)':'var(--red)';}
function cumpBadge(p){var c=p>=100?'b-green':p>=80?'b-orange':'b-red';return '<span class="badge '+c+'">'+p+'%</span>';}
function loadOv(){try{return JSON.parse(localStorage.getItem('obj_abc_2026')||'{}');}catch(e){return {};}}
function saveOv(o){localStorage.setItem('obj_abc_2026',JSON.stringify(o));}
function getObj(v){
  var d=DD.vend[v], ov=loadOv()[v]||{};
  var o={imp:ov.imp!=null?ov.imp:d.obj_imp, uni:ov.uni!=null?ov.uni:d.obj_uni, segs:{}};
  for(var s in d.segmentos){
    var os=(ov.segs||{})[s]||{};
    o.segs[s]={imp:os.imp!=null?os.imp:d.segmentos[s].obj_imp, uni:os.uni!=null?os.uni:d.segmentos[s].obj_uni};
  }
  return o;
}
function destroyCharts(){charts.forEach(function(c){try{c.destroy();}catch(e){}});charts=[];}
function pbar(p){var c=cumpColor(p);var w=Math.min(p,100);return '<div class="pbg"><div class="pfill" style="width:'+w+'%;background:'+c+'"></div></div>';}
function ring(p,label,sub){
  var r=52,c=2*Math.PI*r,off=c*(1-Math.min(p,100)/100);
  var col=p>=100?'#5ee0a0':p>=80?'#f5c97a':'#f3a09a';
  return '<div class="ring-wrap"><div class="ring-lbl">'+label+'</div><div class="ring">'+
    '<svg width="120" height="120"><circle cx="60" cy="60" r="'+r+'" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="11"/>'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="11" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'"/></svg>'+
    '<div class="ring-val"><div class="ring-pct">'+p+'%</div><div class="ring-cap">'+sub+'</div></div></div></div>';
}

/* ============ TAB SYSTEM ============ */
var TABFNS=[];
function setTabs(tabs){
  TABFNS=tabs;
  $('tabs').innerHTML=tabs.map(function(t,i){return '<button class="tab'+(i===0?' active':'')+'" onclick="goTab('+i+')">'+t.label+'</button>';}).join('');
  goTab(0);
}
function goTab(i){
  var btns=document.querySelectorAll('.tab');
  for(var j=0;j<btns.length;j++) btns[j].classList.toggle('active',j===i);
  destroyCharts();
  $('content').innerHTML='<div class="pane active" id="pane"></div>';
  TABFNS[i].fn();
  window.scrollTo(0,0);
}
function toast(msg){
  var t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:13px 26px;border-radius:30px;font-weight:700;font-size:.9rem;z-index:999;box-shadow:0 6px 20px rgba(0,0,0,.25)';
  document.body.appendChild(t);
  setTimeout(function(){t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(function(){t.remove();},400);},1800);
}

  ]},options:chOpts(false)}));

function kpiBox(lbl,val,sub,col){

function chOpts(isMoney){

    h+='<div class="act orange"><div class="act-ico">⚠️</div><div class="act-main"><div class="act-name">'+c.cliente+'</div>'+

  });

     '<div class="cdesc">Clientes tuyos que todavía no te compran ciertas marcas o familias. Buscá uno y ofrecele.</div>'+

function renderOpp(v){
  var d=DD.vend[v], oppF=d.opp_fam||{}, oppM=d.opp_marca||{};
  var q=($('oppSearch')&&$('oppSearch').value||'').toLowerCase();
  var clis=window._oppClis.filter(function(c){return c.toLowerCase().indexOf(q)>=0;});
  var show=clis.slice(0,12);
  var h='';
  if(!show.length) h='<div class="empty"><div class="ico">🔎</div><p>Sin resultados</p></div>';
  show.forEach(function(c){
    var fam=(oppF[c]||[]).slice(0,5), mar=(oppM[c]||[]).slice(0,5);
    var nf_=(oppF[c]||[]).length, nm=(oppM[c]||[]).length;
    h+='<div class="act blue" style="align-items:flex-start"><div class="act-ico">💡</div><div class="act-main">'+
       '<div class="act-name">'+c+'</div>'+
       '<div class="act-det" style="margin-top:5px">';
    if(mar.length) h+='<div style="margin-bottom:4px"><b>Marcas:</b> '+mar.map(function(x){return '<span class="pill">'+x+'</span>';}).join('')+(nm>5?'<span class="pill">+'+(nm-5)+'</span>':'')+'</div>';
    if(fam.length) h+='<div><b>Familias:</b> '+fam.map(function(x){return '<span class="pill">'+x+'</span>';}).join('')+(nf_>5?'<span class="pill">+'+(nf_-5)+'</span>':'')+'</div>';
    h+='</div></div></div>';
  });
  if(clis.length>12) h+='<div style="text-align:center;color:var(--text2);font-size:.82rem;margin-top:8px">'+show.length+' de '+clis.length+' · refiná la búsqueda para ver más</div>';
  $('oppList').innerHTML=h;
}

}
function stackOpts(isMoney){
  return {responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:11,font:{size:10}}},
    tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+(isMoney?money(c.parsed.y):nf(c.parsed.y)+' u');}}}},
    scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true,ticks:{callback:function(v){return isMoney?money(v):nf(v);},font:{size:10}}}}};
}

/* ---- OBJETIVOS EDITABLES ---- */
function gObjetivos(){
  var h='<div class="note">🎯 Los objetivos sugeridos = <b>promedio de meses completos (Ene–May) + '+DD.growth_pct+'%</b>. Editá los números que quieras y tocá <b>Guardar</b>. '+
        'Quedan guardados en este navegador y los vendedores los ven en su tablero.</div>';
  h+='<div class="fbar"><button class="btn btn-primary" onclick="saveObjetivos()">💾 Guardar cambios</button>'+
     '<button class="btn btn-ghost" onclick="resetObjetivos()">↺ Restaurar sugeridos</button></div>';

  DD.vendedores.forEach(function(v){
    var d=DD.vend[v], o=getObj(v);
    h+='<div class="card"><div class="ctitle" style="color:'+(VCOLORS[v]||'var(--navy)')+'">👤 '+v+'</div>';
    h+='<div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:14px">'+
       '<div><div class="kpi-lbl">Objetivo facturación / mes</div><input class="inp" data-v="'+v+'" data-k="imp" value="'+o.imp+'"></div>'+
       '<div><div class="kpi-lbl">Objetivo unidades / mes</div><input class="inp" data-v="'+v+'" data-k="uni" value="'+o.uni+'"></div>'+
       '<div style="align-self:flex-end;font-size:.78rem;color:var(--text2)">Promedio real: '+money(d.avg_imp)+' · '+nf(d.avg_uni)+' u</div></div>';
    // segmentos
    h+='<div class="tscroll"><table class="tbl"><thead><tr><th>Segmento</th><th class="num">Obj. facturación</th><th class="num">Obj. unidades</th><th class="num">Promedio real</th></tr></thead><tbody>';
    Object.keys(d.segmentos).forEach(function(s){
      var seg=d.segmentos[s];
      var avgI=Math.round(seg.imp.reduce(function(a,b){return a+b;},0)/seg.imp.length);
      var avgU=Math.round(seg.uni.reduce(function(a,b){return a+b;},0)/seg.uni.length);
      h+='<tr><td><b>'+s+'</b></td>'+
         '<td class="num"><input class="inp" style="width:120px" data-v="'+v+'" data-k="seg_imp" data-s="'+s+'" value="'+o.segs[s].imp+'"></td>'+
         '<td class="num"><input class="inp" style="width:90px" data-v="'+v+'" data-k="seg_uni" data-s="'+s+'" value="'+o.segs[s].uni+'"></td>'+
         '<td class="num" style="color:var(--text2)">'+money(avgI)+' · '+nf(avgU)+' u</td></tr>';
    });
    h+='</tbody></table></div></div>';
  });
  $('pane').innerHTML=h;
}
function saveObjetivos(){
  var ov=loadOv();
  var inps=document.querySelectorAll('#pane input[data-v]');
  for(var i=0;i<inps.length;i++){
    var inp=inps[i], v=inp.getAttribute('data-v'), k=inp.getAttribute('data-k');
    var val=Math.round(parseFloat((inp.value||'0').toString().replace(/[^0-9.\-]/g,''))||0);
    ov[v]=ov[v]||{};
    if(k==='imp') ov[v].imp=val;
    else if(k==='uni') ov[v].uni=val;
    else if(k==='seg_imp'){ov[v].segs=ov[v].segs||{};var s=inp.getAttribute('data-s');ov[v].segs[s]=ov[v].segs[s]||{};ov[v].segs[s].imp=val;}
    else if(k==='seg_uni'){ov[v].segs=ov[v].segs||{};var s2=inp.getAttribute('data-s');ov[v].segs[s2]=ov[v].segs[s2]||{};ov[v].segs[s2].uni=val;}
  }
  saveOv(ov);
  toast('Objetivos guardados ✓');
}
function resetObjetivos(){
  if(!confirm('¿Restaurar todos los objetivos a los valores sugeridos (promedio +'+DD.growth_pct+'%)? Se perderán los cambios manuales.')) return;
  localStorage.removeItem('obj_abc_2026');
  toast('Objetivos restaurados ✓');
  gObjetivos();
}

/* ---- ACCIONES DEL EQUIPO ---- */
function gAcciones(){
  var rows=DD.vendedores.map(function(v){
    var o=getObj(v), d=DD.vend[v];
    return {v:v,imp:d.imp[ULTI],obj:o.imp,pc:pct(d.imp[ULTI],o.imp),gap:o.imp-d.imp[ULTI],caidos:d.caidos||[],riesgo:d.riesgo||[]};
  });
  var bajo=rows.filter(function(r){return r.pc<100;}).sort(function(a,b){return b.gap-a.gap;});
  // caidos del equipo
  var allCaidos=[];
  DD.vendedores.forEach(function(v){(DD.vend[v].caidos||[]).forEach(function(c){allCaidos.push({v:v,c:c});});});
  allCaidos.sort(function(a,b){return b.c.total_hist-a.c.total_hist;});
  var totCaidos=allCaidos.length, totRiesgo=DD.vendedores.reduce(function(s,v){return s+(DD.vend[v].riesgo||[]).length;},0);

  var h='<div class="note">🚨 Foco de gestión: dónde está la brecha y qué clientes recuperar primero en todo el equipo.</div>';
  h+='<div class="kpi-grid">'+
     kpiBox('Vendedores bajo meta',bajo.length+' / '+rows.length,'no llegaron al 100%','var(--orange)')+
     kpiBox('Clientes a recuperar',totCaidos+'','en todo el equipo','var(--red)')+
     kpiBox('Clientes en riesgo',totRiesgo+'','cayeron fuerte','var(--orange)')+
     '</div>';

  h+='<div class="card"><div class="ctitle">Brecha contra objetivo — '+ML[ULT]+'</div>'+
     '<div class="cdesc">Cuánto le falta a cada vendedor para llegar a su objetivo del mes.</div>';
  if(!bajo.length) h+='<div class="empty"><div class="ico">🎉</div><p>¡Todo el equipo en meta!</p></div>';
  else bajo.forEach(function(r){
    h+='<div class="act '+(r.pc<80?'red':'orange')+'"><div class="act-ico">'+(r.pc<80?'🔴':'🟠')+'</div>'+
       '<div class="act-main"><div class="act-name">'+r.v+'</div><div class="act-det">facturó '+money(r.imp)+' de '+money(r.obj)+' · '+cumpBadge(r.pc)+'</div></div>'+
       '<div class="act-amt" style="color:var(--red)">-'+money(r.gap)+'<div style="font-size:.68rem;color:var(--text2);font-weight:600;text-align:right">para la meta</div></div></div>';
  });
  h+='</div>';

  h+='<div class="card"><div class="ctitle">🔴 Top 15 clientes a recuperar (todo el equipo)</div>'+
     '<div class="cdesc">Clientes que dejaron de comprar, ordenados por su facturación histórica.</div>'+
     '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th>Vendedor</th><th>Segmento</th><th class="num">Histórico</th><th>Última compra</th></tr></thead><tbody>';
  allCaidos.slice(0,15).forEach(function(x){
    h+='<tr><td><b>'+x.c.cliente+'</b></td><td>'+x.v+'</td><td><span class="badge b-blue">'+x.c.segmento+'</span></td>'+
       '<td class="num">'+moneyFull(x.c.total_hist)+'</td><td>'+(ML[x.c.ultimo_mes]||x.c.ultimo_mes)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  $('pane').innerHTML=h;
}

/* ============ CLIENTES (objetivos por cliente, historia real) ============ */
var TENDC={'Creciendo':'b-green','Cayendo':'b-red','Estable':'b-blue','Perdido':'b-gray','Nuevo':'b-orange','Sin hist.':'b-gray'};
function tendBadge(t){return '<span class="badge '+(TENDC[t]||'b-gray')+'">'+t+'</span>';}
function evolReal(r){
  function arr(a,b){ if(b>a*1.05) return '<span style="color:var(--green)">▲</span>'; if(b<a*0.95) return '<span style="color:var(--red)">▼</span>'; return '<span style="color:var(--text2)">→</span>';}
  return '<span style="white-space:nowrap">'+money(r[0])+' '+arr(r[0],r[1])+' '+money(r[1])+' '+arr(r[1],r[2])+' '+money(r[2])+'</span>';
}
function paceColor(p){ return p>=45?'var(--green2)':p>=28?'var(--orange)':'var(--red)'; }

function vClientes(v){
  var items=(DD2.vend[v]||[]);
  var totObj=items.reduce(function(s,x){return s+x.obj;},0);
  var totYtd=items.reduce(function(s,x){return s+x.ytd;},0);
  var p=pct(totYtd,totObj);
  var rsm=DD2.resumen[v]||{};
  var h='<div class="note">👥 Tus clientes con su <b>objetivo anual 2026</b> (en pesos reales, según su historia 2023-2025) y cuánto les llevás facturado este año. Estamos promediando el año — apuntá a ~50% para junio.</div>';
  h+='<div class="kpi-grid">'+
     kpiBox('Tus clientes',items.length+'','con objetivo asignado','var(--navy)')+
     kpiBox('Objetivo anual 2026',money(totObj),'suma de tu cartera','var(--blue)')+
     kpiBox('Facturado 2026',money(totYtd),p+'% del objetivo anual',paceColor(p))+
     kpiBox('Creciendo / Cayendo',(rsm.creciendo||0)+' / '+(rsm.cayendo||0),'en términos reales','var(--accent)')+
     '</div>';
  h+='<div class="card"><div class="ctitle">📒 Cartera de clientes — objetivo y avance 2026</div>'+
     '<div class="cdesc">Evolución real 2023→2024→2025, tendencia, objetivo anual y lo facturado este año. Ordenado por tamaño de objetivo.</div>'+
     '<div class="fbar"><input type="text" class="srch" id="cliSrch" placeholder="🔎 Buscar cliente..." oninput="renderCli(\''+v+'\')">'+
     '<select class="fsel" id="cliFil" onchange="renderCli(\''+v+'\')" style="padding:9px 12px;border:1.5px solid var(--border);border-radius:9px">'+
     '<option value="">Todas las tendencias</option><option>Creciendo</option><option>Cayendo</option><option>Perdido</option><option>Nuevo</option><option>Sin hist.</option></select></div>'+
     '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th>Evolución real (pesos hoy)</th><th>Tendencia</th><th class="num">Objetivo 2026</th><th class="num">Facturado 2026</th><th>Avance</th></tr></thead><tbody id="cliBody"></tbody></table></div></div>';
  $('pane').innerHTML=h;
  window._cliV=v; renderCli(v);
}
function renderCli(v){
  var items=(DD2.vend[v]||[]);
  var q=($('cliSrch')&&$('cliSrch').value||'').toLowerCase();
  var fil=($('cliFil')&&$('cliFil').value||'');
  var fl=items.filter(function(x){return x.name.toLowerCase().indexOf(q)>=0 && (!fil||x.tend===fil);});
  var show=fl.slice(0,40);
  var h='';
  show.forEach(function(x){
    var pc=pct(x.ytd,x.obj);
    h+='<tr><td><b>'+x.name+'</b></td>'+
       '<td>'+(x.tend==='Sin hist.'?'<span style="color:var(--text2)">sin datos previos</span>':evolReal(x.r))+'</td>'+
       '<td>'+tendBadge(x.tend)+'</td>'+
       '<td class="num">'+money(x.obj)+'</td>'+
       '<td class="num">'+money(x.ytd)+'</td>'+
       '<td><div style="display:flex;align-items:center;gap:7px;min-width:120px">'+pbar(pc)+'<span style="font-weight:700;font-size:.8rem;color:'+paceColor(pc)+'">'+pc+'%</span></div></td></tr>';
  });
  if(!show.length) h='<tr><td colspan="6"><div class="empty"><div class="ico">🔎</div><p>Sin resultados</p></div></td></tr>';
  $('cliBody').innerHTML=h;
  if(fl.length>40) $('cliBody').innerHTML+='<tr><td colspan="6" style="text-align:center;color:var(--text2);font-size:.82rem">Mostrando 40 de '+fl.length+' · refiná la búsqueda</td></tr>';
}

function gClientes(){
  var R=DD2.resumen, V=DD.vendedores;
  var totObj=0,totYtd=0;
  V.forEach(function(v){totObj+=R[v].obj;totYtd+=R[v].ytd;});
  var p=pct(totYtd,totObj);
  var h='<div class="note">👥 Objetivos por cliente: cada vendedor tiene un objetivo anual 2026 por cliente, basado en la facturación real (deflactada) 2023-2025. Acá el resumen del equipo.</div>';
  h+='<div class="kpi-grid">'+
     kpiBox('Objetivo anual 2026',money(totObj),'suma de objetivos por cliente','var(--blue)')+
     kpiBox('Facturado 2026',money(totYtd),p+'% del objetivo anual',paceColor(p))+
     kpiBox('Clientes con objetivo',V.reduce(function(s,v){return s+R[v].n;},0)+'','en las 6 carteras','var(--navy)')+
     '</div>';
  h+='<div class="card"><div class="ctitle">Objetivo por cliente — por vendedor</div>'+
     '<div class="cdesc">Suma de los objetivos anuales por cliente de cada cartera y el avance del año.</div>'+
     '<div class="tscroll"><table class="tbl"><thead><tr><th>Vendedor</th><th class="num">Clientes</th><th class="num">Objetivo 2026</th><th class="num">Facturado 2026</th><th>Avance</th><th>Creciendo</th><th>Cayendo</th><th>Perdidos</th></tr></thead><tbody>';
  V.forEach(function(v){
    var r=R[v], pc=pct(r.ytd,r.obj);
    h+='<tr><td><b>'+v+'</b></td><td class="num">'+r.n+'</td>'+
       '<td class="num">'+money(r.obj)+'</td><td class="num">'+money(r.ytd)+'</td>'+
       '<td><div style="display:flex;align-items:center;gap:7px;min-width:120px">'+pbar(pc)+'<span style="font-weight:700;font-size:.8rem;color:'+paceColor(pc)+'">'+pc+'%</span></div></td>'+
       '<td><span class="badge b-green">'+r.creciendo+'</span></td><td><span class="badge b-red">'+r.cayendo+'</span></td><td><span class="badge b-gray">'+r.perdido+'</span></td></tr>';
  });
  h+='</tbody></table></div></div>';
  var all=[];
  V.forEach(function(v){(DD2.vend[v]||[]).forEach(function(x){all.push({v:v,x:x});});});
  var riesgo=all.filter(function(o){return o.x.obj>20000000 && pct(o.x.ytd,o.x.obj)<25;}).sort(function(a,b){return b.x.obj-a.x.obj;});
  h+='<div class="card"><div class="ctitle">⚠️ Clientes grandes muy atrasados contra su objetivo</div>'+
     '<div class="cdesc">Objetivo anual mayor a $20 M pero con menos del 25% facturado a junio. Foco de gestión.</div>'+
     '<div class="tscroll"><table class="tbl"><thead><tr><th>Cliente</th><th>Vendedor</th><th>Tendencia</th><th class="num">Objetivo 2026</th><th class="num">Facturado</th><th class="num">Avance</th></tr></thead><tbody>';
  riesgo.slice(0,15).forEach(function(o){
    var pc=pct(o.x.ytd,o.x.obj);
    h+='<tr><td><b>'+o.x.name+'</b></td><td>'+o.v+'</td><td>'+tendBadge(o.x.tend)+'</td>'+
       '<td class="num">'+money(o.x.obj)+'</td><td class="num">'+money(o.x.ytd)+'</td><td class="num" style="color:var(--red);font-weight:700">'+pc+'%</td></tr>';
  });
  if(!riesgo.length) h+='<tr><td colspan="6"><div class="empty"><div class="ico">✅</div><p>Sin clientes grandes atrasados</p></div></td></tr>';
  h+='</tbody></table></div></div>';
  $('pane').innerHTML=h;
}


</script>
